<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notas">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" type="image/png" href="icono.png">
    
    <title>Notas - Mi Espacio</title>
    <style>
        :root {
            /* Paleta de colores Retro Pop (Bento Style) */
            --bg-main: #dbe9d0c4;
            --dark-green: #0C493D;
            --lavender: #A18CEE;
            --mint-green: #9CF6A8;
            --peach-orange: #FA8E62;
            --pale-yellow: #FDF1C2;
            
            /* Colores específicos para notas */
            --pastel-pink: #FFB3C6;     /* Ama */
            --pastel-blue: #BEE3F8;     /* Dato */
            --soft-brown: #D4B895;      /* Odia */
            
            --text-dark: #1A1C1A;
            --text-light: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Barra Superior --- */
        .top-bar {
            width: 100%;
            background-color: transparent;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .top-bar .page-title {
            font-family: "Georgia", serif;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--dark-green);
        }

        /* --- Contenedor Principal --- */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 10px 20px calc(130px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- WIDGET CONTADOR (Diseño Bento) --- */
        .counter-bento {
            background-color: var(--text-light);
            border-radius: 32px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .counter-header {
            font-size: 0.8rem;
            font-weight: 800;
            color: rgba(26, 28, 26, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .counter-header svg {
            width: 16px; height: 16px;
            stroke: var(--dark-green); stroke-width: 2.5; fill: none;
        }

        .counter-days {
            font-family: "Georgia", serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--dark-green);
            line-height: 1;
            margin-bottom: 4px;
        }

        .counter-detail {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--peach-orange);
            background-color: rgba(250, 142, 98, 0.15);
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* --- BARRA DE BÚSQUEDA --- */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.5);
            border: none;
            border-radius: 24px;
            padding: 14px 20px 14px 45px;
            font-family: -apple-system, sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            transition: background-color 0.2s;
        }

        .search-input:focus {
            background-color: rgba(255, 255, 255, 0.9);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            stroke: rgba(26, 28, 26, 0.5);
            stroke-width: 2.5;
            fill: none;
            pointer-events: none;
        }

        /* --- WIDGET CREAR NOTA --- */
        .create-note-bento {
            background-color: var(--text-light);
            border-radius: 32px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .create-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--dark-green);
            text-transform: uppercase;
        }

        /* AJUSTE DEL ÍCONO DEL LÁPIZ EN EL TÍTULO */
        .create-header svg {
            width: 16px; 
            height: 16px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .note-input {
            width: 100%;
            min-height: 90px;
            background-color: rgba(26, 28, 26, 0.04);
            border: none;
            border-radius: 20px;
            padding: 15px;
            font-family: -apple-system, sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-dark);
            resize: none;
            outline: none;
        }

        /* Selector de Categorías (Colores) */
        .category-selectors {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        .category-selectors::-webkit-scrollbar { display: none; }

        .cat-pill {
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.5;
            white-space: nowrap;
            border: 2px solid transparent;
        }

        .cat-pill.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .cat-normal { background-color: var(--pale-yellow); color: var(--text-dark); }
        .cat-ama { background-color: var(--pastel-pink); color: var(--text-dark); }
        .cat-dato { background-color: var(--pastel-blue); color: var(--dark-green); }
        .cat-odia { background-color: var(--soft-brown); color: var(--text-light); }

        .btn-save {
            background-color: var(--text-dark);
            color: var(--mint-green);
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-save:active { transform: scale(0.97); }

        /* --- CUADRÍCULA DE NOTAS --- */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            align-items: start;
        }

        .note-card {
            border-radius: 28px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            min-height: 130px;
            transition: transform 0.2s;
            color: var(--text-dark);
        }

        .note-card:active { transform: scale(0.96); }

        /* Clases de colores */
        .bg-normal { background-color: var(--pale-yellow); }
        .bg-ama { background-color: var(--pastel-pink); }
        .bg-dato { background-color: var(--pastel-blue); }
        .bg-odia { background-color: var(--soft-brown); color: var(--text-light) !important; }
        .bg-odia .note-date, .bg-odia .btn-delete svg { color: var(--text-light); stroke: var(--text-light); }
        .bg-odia .watermark { stroke: var(--text-light); opacity: 0.15; }

        /* AJUSTE DEL LÁPIZ DE MARCA DE AGUA */
        .watermark {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 45px;
            height: 45px;
            opacity: 0.12;
            transform: rotate(-10deg);
            pointer-events: none;
            stroke: var(--text-dark);
            fill: none;
            stroke-width: 2;
        }

        .note-tag {
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            background-color: rgba(255, 255, 255, 0.4);
            padding: 2px 8px;
            border-radius: 10px;
            align-self: flex-start;
            margin-bottom: 6px;
            z-index: 1;
        }

        .bg-odia .note-tag { background-color: rgba(0, 0, 0, 0.2); color: var(--text-light); }

        .note-date { font-size: 0.7rem; font-weight: 800; opacity: 0.6; margin-bottom: 8px; z-index: 1; }
        .note-content { font-size: 0.95rem; font-weight: 700; line-height: 1.4; z-index: 1; word-wrap: break-word; }

        .btn-delete {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            background-color: rgba(26, 28, 26, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
        }
        .bg-odia .btn-delete { background-color: rgba(255, 255, 255, 0.2); }
        
        .btn-delete svg { width: 12px; height: 12px; stroke: var(--text-dark); stroke-width: 3; fill: none; }

        .empty-state {
            grid-column: span 2; text-align: center; padding: 30px 20px; color: rgba(26, 28, 26, 0.5); font-weight: 700; font-size: 0.9rem;
        }

        /* --- Barra Inferior --- */
        .bottom-nav {
            position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 380px; background-color: var(--text-light); border: 3px solid var(--text-dark); border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 6px 15px; box-shadow: 6px 6px 0px var(--text-dark); z-index: 100;
        }
        .nav-item { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 16px; color: var(--text-dark); opacity: 0.5; text-decoration: none; transition: all 0.2s; }
        .nav-item:active { opacity: 1; transform: scale(0.9); }
        .nav-item.home-btn { width: 60px; height: 60px; border-radius: 50%; background-color: var(--peach-orange); color: var(--text-dark); opacity: 1; border: 3px solid var(--text-dark); box-shadow: 0px 4px 0px var(--text-dark); transform: translateY(-12px); flex-shrink: 0; }
        .nav-item.home-btn:active { transform: translateY(-8px); box-shadow: 0px 0px 0px var(--text-dark); }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    </style>
</head>
<body>

    <nav class="top-bar">
        <div class="page-title">Notas</div>
    </nav>

    <div class="container">

        <!-- 1. WIDGET CONTADOR -->
        <div class="counter-bento">
            <div class="counter-header">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                Desde el 15 Oct 2025
            </div>
            <div class="counter-days" id="count-days">-- Días</div>
            <div class="counter-detail" id="count-detail">-- Meses y -- Días</div>
        </div>

        <!-- 2. BARRA DE BÚSQUEDA -->
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar notas...">
        </div>

        <!-- 3. WIDGET CREAR NOTA -->
        <div class="create-note-bento">
            <div class="create-header">
                <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                Nueva Nota
            </div>
            
            <textarea class="note-input" id="noteInput" placeholder="Escribe algo aquí..."></textarea>
            
            <!-- Píldoras de Categoría -->
            <div class="category-selectors" id="catSelectors">
                <div class="cat-pill cat-normal active" data-type="normal">Nota</div>
                <div class="cat-pill cat-ama" data-type="ama">Ama</div>
                <div class="cat-pill cat-dato" data-type="dato">Dato</div>
                <div class="cat-pill cat-odia" data-type="odia">Odia</div>
            </div>

            <button class="btn-save" onclick="saveNote()">
                Guardar
            </button>
        </div>

        <!-- 4. CUADRÍCULA DE NOTAS -->
        <div class="notes-grid" id="notesGrid">
            <!-- Cargadas por JS -->
        </div>

    </div>

    <!-- Barra Inferior -->
    <nav class="bottom-nav">
        <a href="dinero.html" class="nav-item"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></a>
        <a href="horario.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
        <a href="index.html" class="nav-item home-btn"><svg viewBox="0 0 24 24" style="stroke: var(--text-dark);"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="track.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></a>
        <a href="meta.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg></a>
    </nav>

    <!-- SCRIPTS -->
    <script>
        // 1. LÓGICA DEL CONTADOR
        function calcularContador() {
            const fechaInicio = new Date('2025-10-15T00:00:00');
            const fechaHoy = new Date(); 
            
            // Días totales
            const diferenciaTiempo = fechaHoy - fechaInicio;
            const diasTotales = Math.floor(diferenciaTiempo / (1000 * 60 * 60 * 24));
            
            if (diasTotales < 0) {
                document.getElementById('count-days').textContent = "0 Días";
                document.getElementById('count-detail').textContent = "Aún no es la fecha";
                return;
            }

            let años = fechaHoy.getFullYear() - fechaInicio.getFullYear();
            let meses = fechaHoy.getMonth() - fechaInicio.getMonth();
            let dias = fechaHoy.getDate() - fechaInicio.getDate();

            if (dias < 0) {
                meses--;
                const mesAnterior = new Date(fechaHoy.getFullYear(), fechaHoy.getMonth(), 0);
                dias += mesAnterior.getDate();
            }
            if (meses < 0) {
                años--;
                meses += 12;
            }
            
            let mesesTotales = (años * 12) + meses;

            document.getElementById('count-days').textContent = diasTotales + " Días";
            
            if (mesesTotales === 0) {
                document.getElementById('count-detail').textContent = dias + (dias === 1 ? " Día" : " Días");
            } else {
                document.getElementById('count-detail').textContent = mesesTotales + " Meses y " + dias + " Días";
            }
        }

        // 2. LÓGICA DE NOTAS 
        const watermarkSVG = `<svg class="watermark" viewBox="0 0 24 24"><path d="M13.2 19l-4.2-4.2M18.8 13.4l-4.2-4.2M16 11l-4 4M21.5 3.5a2.12 2.12 0 0 1 0 3l-12 12L3 21l2.5-6.5 12-12a2.12 2.12 0 0 1 4 0z"></path></svg>`;
        const months = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        
        let currentType = 'normal';
        const pills = document.querySelectorAll('.cat-pill');
        
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentType = pill.getAttribute('data-type');
            });
        });

        function loadNotes(searchTerm = '') {
            const notes = JSON.parse(localStorage.getItem('myNotes')) || [];
            const grid = document.getElementById('notesGrid');
            grid.innerHTML = '';

            const filteredNotes = notes.filter(note => 
                note.text.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (filteredNotes.length === 0) {
                grid.innerHTML = `<div class="empty-state">No hay notas que mostrar.</div>`;
                return;
            }

            filteredNotes.forEach((note) => {
                const realIndex = notes.indexOf(note);
                const noteType = note.type || 'normal';
                
                const card = document.createElement('div');
                card.className = `note-card bg-${noteType}`;
                
                const tagHtml = noteType !== 'normal' ? `<div class="note-tag">${noteType}</div>` : '';

                card.innerHTML = `
                    ${watermarkSVG}
                    <div class="btn-delete" onclick="deleteNote(${realIndex})">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                    ${tagHtml}
                    <div class="note-date">${note.date}</div>
                    <div class="note-content">${note.text.replace(/\n/g, '<br>')}</div>
                `;
                
                grid.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            loadNotes(e.target.value);
        });

        function saveNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            
            if (text === '') return; 

            const now = new Date();
            const dateStr = `${now.getDate()} ${months[now.getMonth()]}`;

            const newNote = {
                text: text,
                date: dateStr,
                type: currentType 
            };

            const notes = JSON.parse(localStorage.getItem('myNotes')) || [];
            notes.unshift(newNote); 
            
            localStorage.setItem('myNotes', JSON.stringify(notes));
            
            input.value = '';
            document.getElementById('searchInput').value = '';
            
            currentType = 'normal';
            pills.forEach(p => p.classList.remove('active'));
            document.querySelector('.cat-normal').classList.add('active');

            loadNotes();
        }

        function deleteNote(index) {
            const notes = JSON.parse(localStorage.getItem('myNotes')) || [];
            notes.splice(index, 1);
            localStorage.setItem('myNotes', JSON.stringify(notes));
            
            const searchTerm = document.getElementById('searchInput').value;
            loadNotes(searchTerm);
        }

        document.addEventListener('DOMContentLoaded', () => {
            calcularContador();
            loadNotes();
        });
    </script>
</body>
</html>
