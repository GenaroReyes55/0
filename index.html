<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Mi Espacio">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" type="image/png" href="icono.png">
    
    <title>Mi Espacio Web</title>
    <style>
        :root {
            /* Paleta de colores Retro Pop */
            --bg-main: #dbe9d0c4;
            --dark-green: #0C493D;
            --lavender: #A18CEE;
            --mint-green: #9CF6A8;
            --peach-orange: #FA8E62;
            --pale-yellow: #FDF1C2;
            --pastel-pink: #FFB3C6;
            --text-dark: #1A1C1A;
            --text-light: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Barra Superior Fija --- */
        .top-bar {
            width: 100%;
            background-color: transparent;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text-dark);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .top-bar .app-name {
            font-family: "Georgia", serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-green);
        }

        /* --- Botón de Perfil --- */
        .profile-img-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--text-dark);
            box-shadow: 2px 2px 0px var(--text-dark);
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .profile-img-container:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--text-dark);
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Contenedor Principal --- */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px 20px calc(40px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
        }

        /* --- Diseño Bento Grid Sólido --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            grid-auto-rows: minmax(130px, auto);
            margin-bottom: 35px;
        }

        .widget {
            border-radius: 32px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        .widget:active {
            transform: scale(0.95);
        }

        .widget-large { grid-column: span 2; }
        
        .widget-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .widget-title {
            font-family: "Georgia", serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* 1. HORARIO */
        .widget-horario { background-color: var(--dark-green); color: var(--text-light); }
        .widget-horario .widget-title { color: var(--mint-green); }
        .pill-tag {
            background-color: var(--peach-orange); color: var(--text-dark); font-size: 0.75rem; font-weight: 700;
            padding: 4px 10px; border-radius: 20px; margin-left: auto; text-transform: uppercase;
        }
        .schedule-list { display: flex; flex-direction: column; gap: 12px; }
        .schedule-item {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;
        }
        .schedule-item:last-child { border-bottom: none; padding-bottom: 0; }
        .schedule-info strong { font-size: 1rem; display: block; }
        .schedule-time { font-size: 1.1rem; font-weight: 700; text-align: right; color: var(--pale-yellow);}
        .schedule-time span { font-size: 0.8rem; display: block; color: rgba(255,255,255,0.6); font-weight: normal; }

        /* 2. DINERO */
        .widget-dinero { background-color: var(--pale-yellow); color: var(--dark-green); justify-content: center;}
        .widget-dinero .amount { font-size: 2rem; font-weight: 800; font-family: "Georgia", serif; }
        .widget-dinero .label { font-size: 0.9rem; font-weight: 600; opacity: 0.7; }

        /* 3. META */
        .widget-meta { background-color: var(--lavender); color: var(--text-dark); justify-content: center;}
        .progress-bar-bg { width: 100%; height: 12px; background: rgba(0,0,0,0.1); border-radius: 20px; margin-top: 10px; overflow: hidden;}
        .progress-bar-fill { width: 65%; height: 100%; background: var(--text-dark); border-radius: 20px; }

        /* 4. NOTAS */
        .widget-notas { 
            background-color: var(--dark-green); color: var(--text-light);
            flex-direction: row; justify-content: space-between; align-items: center;
        }
        .widget-notas .widget-title { color: var(--lavender); margin: 0; }
        
        /* 5. TRACK */
        .widget-track { 
            background-color: var(--mint-green); color: var(--dark-green); 
            align-items: center; justify-content: center; grid-column: span 2;
        }
        
        .icon-large {
            width: 40px; height: 40px; margin-bottom: 8px; z-index: 1;
            stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;
        }

        /* --- Ticket Discreto --- */
        .discreet-ticket {
            position: relative;
            background-color: transparent;
            border: 2px dashed rgba(26, 28, 26, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin: 0 auto;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .discreet-ticket::before, .discreet-ticket::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background-color: var(--bg-main);
            border-radius: 50%;
            border: 2px solid transparent;
        }
        .discreet-ticket::before { left: -8px; border-right-color: rgba(26, 28, 26, 0.2); }
        .discreet-ticket::after { right: -8px; border-left-color: rgba(26, 28, 26, 0.2); }

        .ticket-icon {
            font-size: 1.2rem;
            margin-bottom: 5px;
            opacity: 0.6;
        }

        .ticket-dates {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(26, 28, 26, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .ticket-stats {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-total-days {
            font-family: "Georgia", serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .stat-conversion {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--dark-green);
        }

        /* --- ESTILOS DEL MODAL DE RESPALDO --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 200; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-alert {
            background-color: var(--text-light); width: 90%; max-width: 340px;
            border-radius: 32px; padding: 30px 25px; display: flex; flex-direction: column; gap: 15px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .modal-title { font-family: "Georgia", serif; font-size: 1.4rem; font-weight: 900; color: var(--dark-green); text-align: center; line-height: 1.1;}
        .modal-desc { font-size: 0.9rem; font-weight: 600; color: rgba(26,28,26,0.6); text-align: center; margin-bottom: 5px;}
        
        .btn-modal {
            width: 100%; padding: 16px; border-radius: 20px; font-size: 1rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; border: none; transition: transform 0.2s;
        }
        .btn-modal:active { transform: scale(0.96); }
        .btn-modal svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        
        .btn-download { background-color: var(--mint-green); color: var(--dark-green); }
        .btn-upload { background-color: var(--lavender); color: var(--text-dark); }
        .btn-cancel { background-color: transparent; color: #C62828; margin-top: -5px; }
    </style>
</head>
<body>

    <nav class="top-bar">
        <div class="app-name">Mi Espacio</div>
        <div class="profile-img-container" onclick="openBackupModal()">
            <img src="icono.png" alt="Perfil">
        </div>
    </nav>

    <div class="container">
        <nav class="bento-grid">
            <a href="horario.html" class="widget widget-large widget-horario">
                <div class="widget-header">
                    <span class="widget-title">Horario</span>
                    <span class="pill-tag">Hoy</span>
                </div>
                <div class="schedule-list">
                    <div class="schedule-item">
                        <div class="schedule-info">
                            <strong>Escuela</strong>
                        </div>
                        <div class="schedule-time">
                            08:00
                            <span>a 10:30</span>
                        </div>
                    </div>
                    <div class="schedule-item">
                        <div class="schedule-info">
                            <strong>Trabajo</strong>
                        </div>
                        <div class="schedule-time">
                            Turno Tarde
                        </div>
                    </div>
                </div>
            </a>

            <a href="dinero.html" class="widget widget-dinero">
                <div class="label">Balance</div>
                <div class="amount">$0</div>
            </a>

            <a href="meta.html" class="widget widget-meta">
                <span class="widget-title">Meta</span>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill"></div>
                </div>
            </a>

            <a href="notas.html" class="widget widget-large widget-notas">
                <span class="widget-title">Notas Rápidas</span>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--mint-green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>

            <a href="track.html" class="widget widget-track">
                <svg class="icon-large" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                <span class="widget-title">Track</span>
            </a>
        </nav>

        <div class="discreet-ticket">
            <div class="ticket-icon">♡</div>
            <div class="ticket-dates">Inicio: 15 Abr 2026</div>
            <div class="ticket-stats">
                <div id="total-dias" class="stat-total-days">-- días de relación</div>
                <div id="conversion-meses" class="stat-conversion">-- meses y -- días</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="backupModal">
        <div class="modal-alert">
            <div class="modal-title">Gestión de Datos</div>
            <div class="modal-desc">Respalda toda tu información de finanzas, horarios, notas y track anual en tu teléfono.</div>
            
            <button class="btn-modal btn-download" onclick="downloadBackup()">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Descargar Respaldo
            </button>

            <button class="btn-modal btn-upload" onclick="document.getElementById('fileInput').click()">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Cargar Respaldo
            </button>
            <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="loadBackup(event)">

            <button class="btn-modal btn-cancel" onclick="closeBackupModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // Lógica de fechas del ticket
        document.addEventListener("DOMContentLoaded", () => {
            const fechaInicio = new Date('2026-04-15T00:00:00');
            const fechaHoy = new Date(); 
            
            const diferenciaTiempo = Math.abs(fechaHoy - fechaInicio);
            const diasTotales = Math.floor(diferenciaTiempo / (1000 * 60 * 60 * 24));
            
            let años = fechaHoy.getFullYear() - fechaInicio.getFullYear();
            let meses = fechaHoy.getMonth() - fechaInicio.getMonth();
            let dias = fechaHoy.getDate() - fechaInicio.getDate();

            if (dias < 0) {
                meses--;
                const mesAnterior = new Date(fechaHoy.getFullYear(), fechaHoy.getMonth(), 0);
                dias += mesAnterior.getDate();
            }
            if (meses < 0) {
                años--;
                meses += 12;
            }
            
            let mesesTotales = (años * 12) + meses;

            document.getElementById('total-dias').textContent = diasTotales + " días de relación";
            document.getElementById('conversion-meses').textContent = mesesTotales + " meses y " + dias + " días juntos";
        });

        // --- LÓGICA DEL RESPALDO (BACKUP) ---
        function openBackupModal() {
            document.getElementById('backupModal').classList.add('active');
        }

        function closeBackupModal() {
            document.getElementById('backupModal').classList.remove('active');
            document.getElementById('fileInput').value = '';
        }

        function downloadBackup() {
            const backupData = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                backupData[key] = localStorage.getItem(key);
            }
            
            if (Object.keys(backupData).length === 0) {
                alert("Aún no tienes información guardada en la aplicación para respaldar.");
                return;
            }

            const jsonStr = JSON.stringify(backupData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            
            const fileDate = new Date().toISOString().split('T')[0];
            a.download = `MiEspacio_Respaldo_${fileDate}.json`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            closeBackupModal();
        }

        function loadBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    for (const key in data) {
                        localStorage.setItem(key, data[key]);
                    }
                    
                    alert("¡Datos restaurados con éxito! Tu información está de vuelta.");
                    closeBackupModal();
                    // Refrescar para aplicar los cambios visuales si hubiera variables
                    window.location.reload(); 
                    
                } catch (error) {
                    alert("Error al leer el archivo. Asegúrate de cargar el respaldo correcto (.json).");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
