<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Track">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" type="image/png" href="icono.png">
    
    <title>Track Anual - Mi Espacio</title>
    <style>
        :root {
            /* Paleta Bento */
            --bg-main: #dbe9d0c4;
            --dark-green: #0C493D;
            --mint-green: #9CF6A8;
            --peach-orange: #FA8E62;
            --lavender: #A18CEE;
            --text-dark: #1A1C1A;
            --text-light: #FFFFFF;
            --day-empty: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Barra Superior --- */
        .top-bar {
            width: 100%;
            background-color: transparent;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .top-bar .page-title {
            font-family: "Georgia", serif;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--dark-green);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 10px 20px calc(130px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- DASHBOARD DE ESTADÍSTICAS --- */
        .stats-bento {
            background-color: var(--text-light);
            border-radius: 32px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-header {
            text-align: center;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(26, 28, 26, 0.6);
        }

        .total-days {
            text-align: center;
            font-family: "Georgia", serif;
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--dark-green);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 5px;
        }

        .stat-item {
            border-radius: 20px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .stat-item.tux { background-color: rgba(156, 246, 168, 0.3); color: var(--dark-green); }
        .stat-item.cint { background-color: rgba(250, 142, 98, 0.2); color: #B54D24; }
        .stat-item.nv { background-color: rgba(161, 140, 238, 0.2); color: #5B44A3; }

        .stat-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .stat-num { font-size: 1.5rem; font-weight: 900; font-family: "Georgia", serif; }

        /* --- SELECTOR DE MARCADOR (HERRAMIENTAS) --- */
        .toolbar {
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            position: sticky;
            top: calc(60px + env(safe-area-inset-top));
            z-index: 15;
            backdrop-filter: blur(10px);
        }

        .tool-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tool-btn.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .tool-indicator {
            width: 12px; height: 12px; border-radius: 50%;
        }

        .tool-tux { color: var(--dark-green); }
        .tool-tux.active { background-color: var(--text-light); }
        .tool-tux .tool-indicator { background-color: var(--mint-green); }

        .tool-cint { color: #B54D24; }
        .tool-cint.active { background-color: var(--text-light); }
        .tool-cint .tool-indicator { background-color: var(--peach-orange); }

        .tool-nv { color: #5B44A3; }
        .tool-nv.active { background-color: var(--text-light); }
        .tool-nv .tool-indicator { background-color: var(--lavender); }

        .tool-eraser { color: rgba(26, 28, 26, 0.7); }
        .tool-eraser.active { background-color: var(--text-light); color: var(--text-dark); }
        .tool-eraser .tool-indicator { background-color: #ddd; }

        /* --- CALENDARIO (365 DÍAS) --- */
        .calendar-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .month-block {
            background-color: var(--text-light);
            border-radius: 32px;
            padding: 20px;
        }

        .month-title {
            font-family: "Georgia", serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--dark-green);
            margin-bottom: 15px;
            text-align: center;
            text-transform: capitalize;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            aspect-ratio: 1;
            border-radius: 50%; /* Círculos perfectos */
            background-color: var(--day-empty);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(26, 28, 26, 0.4);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, background-color 0.2s;
        }

        .day-cell:active {
            transform: scale(0.9);
        }

        /* Clases de colores para días marcados */
        .marked-tux { background-color: var(--mint-green); color: transparent; }
        .marked-cint { background-color: var(--peach-orange); color: transparent; }
        .marked-nv { background-color: var(--lavender); color: transparent; }

        /* Estilo del SVG de la Carita Sonriente */
        .face-svg {
            position: absolute;
            width: 65%;
            height: 65%;
            stroke: var(--text-dark);
            stroke-width: 2.5;
            stroke-linecap: round;
            fill: none;
            display: none; /* Oculto por defecto */
        }

        /* Mostrar carita si está marcado */
        .marked-tux .face-svg, 
        .marked-cint .face-svg, 
        .marked-nv .face-svg {
            display: block;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-20deg); }
            100% { transform: scale(1) rotate(var(--rand-rot)); }
        }

        /* --- Barra Inferior --- */
        .bottom-nav { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 380px; background-color: var(--text-light); border: 3px solid var(--text-dark); border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 6px 15px; box-shadow: 6px 6px 0px var(--text-dark); z-index: 100; }
        .nav-item { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 16px; color: var(--text-dark); opacity: 0.5; text-decoration: none; transition: all 0.2s; }
        .nav-item:active { opacity: 1; transform: scale(0.9); }
        .nav-item.home-btn { width: 60px; height: 60px; border-radius: 50%; background-color: var(--peach-orange); color: var(--text-dark); opacity: 1; border: 3px solid var(--text-dark); box-shadow: 0px 4px 0px var(--text-dark); transform: translateY(-12px); flex-shrink: 0; }
        .nav-item.home-btn:active { transform: translateY(-8px); box-shadow: 0px 0px 0px var(--text-dark); }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    </style>
</head>
<body>

    <nav class="top-bar">
        <div class="page-title">Póster Anual</div>
    </nav>

    <div class="container">

        <!-- DASHBOARD -->
        <div class="stats-bento">
            <div class="stats-header">Total de Días Marcados</div>
            <div class="total-days" id="count-total">0</div>
            
            <div class="stats-grid">
                <div class="stat-item tux">
                    <span class="stat-num" id="count-tux">0</span>
                    <span class="stat-label">Tux</span>
                </div>
                <div class="stat-item cint">
                    <span class="stat-num" id="count-cint">0</span>
                    <span class="stat-label">Cint</span>
                </div>
                <div class="stat-item nv">
                    <span class="stat-num" id="count-nv">0</span>
                    <span class="stat-label">Nv</span>
                </div>
            </div>
        </div>

        <!-- HERRAMIENTAS (Pinceles) -->
        <div class="toolbar">
            <div class="tool-btn tool-tux active" onclick="setTool('tux')">
                <div class="tool-indicator"></div>
                Tux
            </div>
            <div class="tool-btn tool-cint" onclick="setTool('cint')">
                <div class="tool-indicator"></div>
                Cint
            </div>
            <div class="tool-btn tool-nv" onclick="setTool('nv')">
                <div class="tool-indicator"></div>
                Nv
            </div>
            <div class="tool-btn tool-eraser" onclick="setTool('eraser')">
                <svg viewBox="0 0 24 24" style="width:14px; height:14px; stroke:currentColor; stroke-width:3; fill:none;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                Borrar
            </div>
        </div>

        <!-- CALENDARIO -->
        <div class="calendar-wrapper" id="calendar">
            <!-- Se inyecta por JS -->
        </div>

    </div>

    <!-- Barra Inferior (Oculta Track, Muestra Notas) -->
    <nav class="bottom-nav">
        <a href="dinero.html" class="nav-item"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></a>
        <a href="horario.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
        <a href="index.html" class="nav-item home-btn"><svg viewBox="0 0 24 24" style="stroke: var(--text-dark);"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="notas.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></a>
        <a href="meta.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg></a>
    </nav>

    <!-- SCRIPTS -->
    <script>
        const year = new Date().getFullYear(); // Año actual (Ej. 2026)
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        
        let currentTool = 'tux'; // Pincel seleccionado por defecto
        let trackerData = JSON.parse(localStorage.getItem('myYearTracker')) || {};

        // Carita sonriente SVG (Estilo Bunch of Humans)
        const faceSVG = `
            <svg class="face-svg" viewBox="0 0 24 24">
                <path d="M7.5 10v1 M16.5 10v1" stroke-width="3" stroke-linecap="round"/>
                <path d="M7 15c2 2.5 8 2.5 10 0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </svg>
        `;

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tool-${tool}`).classList.add('active');
        }

        function updateStats() {
            let total = 0; let tux = 0; let cint = 0; let nv = 0;
            
            for (let dateKey in trackerData) {
                if (trackerData[dateKey] === 'tux') tux++;
                if (trackerData[dateKey] === 'cint') cint++;
                if (trackerData[dateKey] === 'nv') nv++;
                total++;
            }

            document.getElementById('count-total').textContent = total;
            document.getElementById('count-tux').textContent = tux;
            document.getElementById('count-cint').textContent = cint;
            document.getElementById('count-nv').textContent = nv;
        }

        function toggleDay(dateKey, element) {
            if (currentTool === 'eraser') {
                delete trackerData[dateKey];
                element.className = 'day-cell';
                element.innerHTML = dateKey.split('-')[2]; // Volver a mostrar el número
            } else {
                trackerData[dateKey] = currentTool;
                element.className = `day-cell marked-${currentTool}`;
                
                // Asignar una rotación aleatoria para la carita
                const randomRotation = Math.floor(Math.random() * 40) - 20; // Entre -20deg y +20deg
                element.style.setProperty('--rand-rot', `${randomRotation}deg`);
                element.innerHTML = faceSVG;
                
                // Aplicar la rotación directamente al SVG
                const svgElement = element.querySelector('.face-svg');
                if (svgElement) svgElement.style.transform = `rotate(${randomRotation}deg)`;
            }

            localStorage.setItem('myYearTracker', JSON.stringify(trackerData));
            updateStats();
        }

        function renderCalendar() {
            const calendarContainer = document.getElementById('calendar');
            calendarContainer.innerHTML = '';

            for (let month = 0; month < 12; month++) {
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                const monthBlock = document.createElement('div');
                monthBlock.className = 'month-block';
                
                monthBlock.innerHTML = `<div class="month-title">${months[month]}</div>`;
                
                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';

                for (let day = 1; day <= daysInMonth; day++) {
                    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dayCell = document.createElement('div');
                    
                    const savedData = trackerData[dateKey];
                    if (savedData) {
                        dayCell.className = `day-cell marked-${savedData}`;
                        const randomRotation = Math.floor(Math.random() * 40) - 20;
                        dayCell.innerHTML = faceSVG;
                        
                        // Rotar svg en carga inicial
                        setTimeout(() => {
                            const svg = dayCell.querySelector('.face-svg');
                            if(svg) {
                                svg.style.transform = `rotate(${randomRotation}deg)`;
                                dayCell.style.setProperty('--rand-rot', `${randomRotation}deg`);
                            }
                        }, 0);

                    } else {
                        dayCell.className = 'day-cell';
                        dayCell.textContent = day;
                    }

                    dayCell.onclick = () => toggleDay(dateKey, dayCell);
                    daysGrid.appendChild(dayCell);
                }

                monthBlock.appendChild(daysGrid);
                calendarContainer.appendChild(monthBlock);
            }
        }

        // Iniciar
        document.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            updateStats();
        });
    </script>
</body>
</html>
