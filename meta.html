<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Proyecciones">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" type="image/png" href="icono.png">
    
    <title>Proyecciones - Mi Espacio</title>
    <style>
        :root {
            /* Paleta Bento Premium */
            --bg-main: #dbe9d0c4;
            --dark-green: #0C493D;
            --mint-green: #9CF6A8;
            --peach-orange: #FA8E62;
            --lavender: #A18CEE;
            --pale-yellow: #FDF1C2;
            --pastel-pink: #FFB3C6;
            --text-dark: #1A1C1A;
            --text-light: #FFFFFF;
            
            /* Colores de UI */
            --income: #2E7D32;
            --expense: #C62828;
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px 20px calc(130px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
        }

        /* --- PROGRESO GIGANTE --- */
        .progress-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .progress-percent {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            color: var(--dark-green);
        }

        .progress-bar-container {
            width: 80%;
            height: 12px;
            background-color: rgba(26, 28, 26, 0.1);
            border-radius: 10px;
            margin: 15px 0 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--lavender);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .progress-subtitle {
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(26, 28, 26, 0.6);
        }

        /* --- DASHBOARD PRINCIPAL --- */
        .dashboard-card {
            background-color: var(--dark-green);
            border-radius: 28px;
            padding: 25px 20px;
            color: var(--text-light);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(12, 73, 61, 0.2);
            margin-bottom: 20px;
        }

        .dash-bg-circle {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 15px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .dash-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .dash-block .label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .dash-block .amount {
            font-family: "Georgia", serif;
            font-size: 2rem;
            font-weight: 800;
        }

        .dash-block.right { text-align: right; }
        
        .dash-block.right .amount-edit {
            background-color: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .dash-block.right .amount-edit:active { transform: scale(0.95); }
        .dash-block.right .amount-edit svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5;}

        .dash-divider {
            width: 100%;
            height: 2px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
        }

        .dash-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: relative;
            z-index: 1;
        }

        .dash-bottom .label { font-size: 0.8rem; font-weight: 800; opacity: 0.8; }
        .dash-bottom .amount { font-family: "Georgia", serif; font-size: 1.5rem; font-weight: 800; }

        /* --- BOTONES DE ACCIÓN --- */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn-action {
            flex: 1;
            padding: 16px 0;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }

        .btn-action:active { transform: scale(0.96); }
        .btn-action svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }

        .btn-adjust { background-color: var(--text-light); color: var(--text-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-new { background-color: var(--lavender); color: var(--text-dark); box-shadow: 0 4px 10px rgba(161, 140, 238, 0.3); }

        /* --- LISTA DE PLANES --- */
        .month-group { margin-bottom: 25px; }

        .month-header {
            font-size: 0.85rem;
            font-weight: 900;
            color: var(--dark-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .plan-card {
            background-color: var(--text-light);
            border-radius: 24px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: opacity 0.3s;
        }

        .plan-card.completed { opacity: 0.6; }

        .plan-date-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            color: var(--text-dark);
        }
        .plan-date-col .d { font-size: 1.1rem; font-weight: 900; line-height: 1; }
        .plan-date-col .m { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; opacity: 0.6; margin-top: 2px;}

        /* Ícono Sólido de la Tarjeta */
        .plan-icon {
            width: 45px;
            height: 45px;
            background-color: rgba(26, 28, 26, 0.05);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .plan-icon svg { 
            width: 22px; 
            height: 22px; 
            fill: var(--text-dark); 
            stroke: none; 
        }

        .plan-details { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        
        .plan-name-row { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .plan-name { font-size: 0.95rem; font-weight: 800; color: var(--text-dark); text-overflow: ellipsis; overflow: hidden;}
        
        .tag-pos {
            background-color: var(--pale-yellow);
            color: var(--text-dark);
            font-size: 0.6rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .plan-amount {
            font-family: "Georgia", serif;
            font-size: 1.05rem;
            font-weight: 800;
            white-space: nowrap;
        }
        .amt-in { color: var(--income); }
        .amt-out { color: var(--expense); }

        .plan-check {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(26, 28, 26, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .plan-card.completed .plan-check { background-color: var(--lavender); border-color: var(--lavender); }
        .plan-check svg { width: 14px; height: 14px; stroke: var(--text-dark); stroke-width: 3; fill: none; opacity: 0; transition: opacity 0.2s; }
        .plan-card.completed .plan-check svg { opacity: 1; }

        .btn-delete-plan {
            width: 28px; height: 28px; border-radius: 50%; background-color: rgba(26, 28, 26, 0.05); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
        }
        .btn-delete-plan svg { width: 12px; height: 12px; stroke: var(--text-dark); stroke-width: 3; fill: none; }

        /* --- MODALES NATIVOS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-overlay); backdrop-filter: blur(5px);
            z-index: 200; display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background-color: var(--bg-main);
            width: 100%; max-width: 420px;
            border-radius: 32px 32px 0 0;
            padding: 25px 20px 40px;
            display: flex; flex-direction: column; gap: 15px;
            animation: slideUp 0.3s ease-out forwards;
        }

        .modal-overlay.centered { align-items: center; }
        .modal-alert {
            background-color: var(--text-light);
            width: 90%; max-width: 320px;
            border-radius: 32px;
            padding: 25px 20px;
            display: flex; flex-direction: column; gap: 15px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .modal-title { font-size: 1.2rem; font-weight: 900; color: var(--dark-green); margin-bottom: 5px;}
        .modal-alert .modal-title { text-align: center; margin-bottom: 0; }

        .modal-tabs { display: flex; background: rgba(26,28,26,0.05); border-radius: 20px; padding: 4px; gap: 4px;}
        .m-tab { flex: 1; padding: 12px 0; text-align: center; font-size: 0.9rem; font-weight: 800; border-radius: 16px; cursor: pointer; color: rgba(26,28,26,0.5); transition: all 0.2s; }
        .m-tab.active[data-val="in"] { background: var(--mint-green); color: var(--dark-green); }
        .m-tab.active[data-val="out"] { background: var(--pastel-pink); color: var(--text-dark); }

        /* Cuadrícula de iconos SÓLIDOS con Scroll */
        .icon-grid {
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 8px;
            background: rgba(255,255,255,0.4); 
            padding: 12px; 
            border-radius: 24px;
            max-height: 220px; 
            overflow-y: auto; 
            scrollbar-width: none; 
        }
        .icon-grid::-webkit-scrollbar { display: none; } 

        .i-opt {
            aspect-ratio: 1; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; color: rgba(26,28,26,0.5);
        }
        .i-opt.active { background: var(--lavender); color: var(--text-dark); transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .i-opt svg { 
            width: 22px; 
            height: 22px; 
            fill: currentColor; 
            stroke: none; 
        }

        .m-input {
            background: rgba(255,255,255,0.6); border: none; border-radius: 18px;
            padding: 16px; font-family: -apple-system, sans-serif; font-size: 1rem;
            font-weight: 700; color: var(--text-dark); outline: none; width: 100%;
        }
        .m-input::placeholder { color: rgba(26,28,26,0.4); }

        .m-check-row { display: flex; align-items: center; gap: 10px; margin: 5px 0 10px; cursor: pointer; }
        .m-box { width: 22px; height: 22px; border: 2px solid rgba(26,28,26,0.4); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .m-check-row input:checked + .m-box { background: var(--peach-orange); border-color: var(--peach-orange); }
        .m-box svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 3; fill: none; opacity: 0; }
        .m-check-row input:checked + .m-box svg { opacity: 1; }
        .m-check-row span { font-size: 0.9rem; font-weight: 800; color: var(--text-dark); }
        .m-check-row input { display: none; }

        .m-btn { padding: 16px; border-radius: 20px; font-size: 1rem; font-weight: 800; cursor: pointer; text-align: center; border: none; }
        .btn-save-plan { background: var(--lavender); color: var(--text-dark); margin-bottom: 8px;}
        .btn-save-alert { background: var(--dark-green); color: var(--mint-green); }
        .btn-cancel { background: transparent; color: var(--expense); }

        /* --- Barra Inferior --- */
        .bottom-nav { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 380px; background-color: var(--text-light); border: 3px solid var(--text-dark); border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 6px 15px; box-shadow: 6px 6px 0px var(--text-dark); z-index: 100; }
        .nav-item { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 16px; color: var(--text-dark); opacity: 0.5; text-decoration: none; transition: all 0.2s; }
        .nav-item:active { opacity: 1; transform: scale(0.9); }
        .nav-item.home-btn { width: 60px; height: 60px; border-radius: 50%; background-color: var(--peach-orange); color: var(--text-dark); opacity: 1; border: 3px solid var(--text-dark); box-shadow: 0px 4px 0px var(--text-dark); transform: translateY(-12px); flex-shrink: 0; }
        .nav-item.home-btn:active { transform: translateY(-8px); box-shadow: 0px 0px 0px var(--text-dark); }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="progress-header">
            <div class="progress-percent" id="lblPercent">0%</div>
            <div class="progress-bar-container">
                <div class="progress-fill" id="barFill" style="width: 0%;"></div>
            </div>
            <div class="progress-subtitle">Avance hacia tu objetivo</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-bg-circle"></div>
            
            <div class="dash-top">
                <div class="dash-block">
                    <div class="label">Saldo Real</div>
                    <div class="amount" id="lblReal">$0.00</div>
                </div>
                <div class="dash-block right">
                    <div class="label">Meta Global</div>
                    <div class="amount-edit" onclick="openEditModal('target')">
                        <span id="lblTarget">$5,000.00</span>
                        <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    </div>
                </div>
            </div>

            <div class="dash-divider"></div>

            <div class="dash-bottom">
                <div class="label">Proyección Final</div>
                <div class="amount" id="lblProj">$0.00</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-action btn-adjust" onclick="openEditModal('base')">
                <svg viewBox="0 0 24 24"><path d="M3 12h18"></path><path d="M12 3v18"></path><path d="M8 8l-4 4 4 4"></path><path d="M16 8l4 4-4 4"></path></svg>
                Ajustar Base
            </button>
            <button class="btn-action btn-new" onclick="openPlanModal()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Nuevo Plan
            </button>
        </div>

        <div id="plansList"></div>

    </div>

    <div class="modal-overlay" id="planModalOverlay">
        <div class="modal-content">
            <div class="modal-title">Añadir Plan</div>
            
            <div class="modal-tabs">
                <div class="m-tab active" data-val="in" onclick="setModalType('in')">+ Ingreso</div>
                <div class="m-tab" data-val="out" onclick="setModalType('out')">- Gasto</div>
            </div>

            <div class="icon-grid" id="iconGridContainer">
                </div>

            <input type="text" id="mDesc" class="m-input" placeholder="Descripción (Ej: Netflix, Gasolina)">
            <input type="number" id="mAmt" class="m-input" placeholder="Monto (Ej: 200)" inputmode="decimal">
            <input type="date" id="mDate" class="m-input" style="color: rgba(26,28,26,0.6);">
            
            <label class="m-check-row">
                <input type="checkbox" id="mPos">
                <div class="m-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                <span>Es solo una posibilidad (No seguro)</span>
            </label>

            <button class="m-btn btn-save-plan" onclick="savePlan()">Guardar Plan</button>
            <button class="m-btn btn-cancel" onclick="closeModals()">Cancelar</button>
        </div>
    </div>

    <div class="modal-overlay centered" id="editModalOverlay">
        <div class="modal-alert">
            <div class="modal-title" id="editModalTitle">Editar Monto</div>
            <input type="number" id="editAmountInput" class="m-input" placeholder="0.00" inputmode="decimal" style="text-align: center; font-size: 1.5rem;">
            <button class="m-btn btn-save-alert" onclick="saveEditAmount()">Guardar Cambios</button>
            <button class="m-btn btn-cancel" style="padding: 0; margin-top: -5px;" onclick="closeModals()">Cancelar</button>
        </div>
    </div>

        <a href="notas.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></a>
        <a href="index.html" class="nav-item home-btn"><svg viewBox="0 0 24 24" style="stroke: var(--text-dark);"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="track.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></a>

    </nav>

        // Estado Global
        let state = JSON.parse(localStorage.getItem('myPlansState')) || {
            baseBalance: 0,
            target: 5000,
            plans: []
        };

        let modalType = 'in';
        let modalIcon = 'star';
        let editMode = ''; 

        // Rellenar Grid de Íconos
        function populateIcons() {
            const grid = document.getElementById('iconGridContainer');
            grid.innerHTML = '';
            for (let key in svgs) {
                const activeClass = key === 'star' ? 'active' : '';
                grid.innerHTML += `<div class="i-opt ${activeClass}" data-icon="${key}" onclick="setModalIcon('${key}')">${svgs[key]}</div>`;
            }
        }

        // Utilidades de formato
        const fmtMoney = num => '$' + parseFloat(num).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
        
        const getMonthYear = dateStr => {
            const d = new Date(dateStr + "T12:00:00");
            const meses = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
            return `${meses[d.getMonth()]} ${d.getFullYear()}`;
        };
        const getDay = dateStr => new Date(dateStr + "T12:00:00").getDate();
        const getShortMonth = dateStr => {
            const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
            return meses[new Date(dateStr + "T12:00:00").getMonth()];
        };

        function render() {
            let saldoReal = state.baseBalance;
            let projFinal = state.baseBalance;

            state.plans.sort((a, b) => new Date(a.date) - new Date(b.date));
            const listEl = document.getElementById('plansList');
            listEl.innerHTML = '';
            let currentGroup = '';

            state.plans.forEach((p) => {
                const amtVal = p.type === 'in' ? p.amount : -p.amount;
                
                if (p.completed) saldoReal += amtVal;
                projFinal += amtVal;

                const groupName = getMonthYear(p.date);
                if (groupName !== currentGroup) {
                    currentGroup = groupName;
                    listEl.innerHTML += `<div class="month-header">${currentGroup}</div>`;
                }

                const amtClass = p.type === 'in' ? 'amt-in' : 'amt-out';
                const sign = p.type === 'in' ? '+' : '-';
                const posTag = p.possible ? `<span class="tag-pos">Posible</span>` : '';
                const compClass = p.completed ? 'completed' : '';
                
                listEl.innerHTML += `
                    <div class="plan-card ${compClass}">
                        <div class="plan-date-col">
                            <span class="d">${getDay(p.date)}</span>
                            <span class="m">${getShortMonth(p.date)}</span>
                        </div>
                        <div class="plan-icon">${svgs[p.icon] || svgs.star}</div>
                        <div class="plan-details">
                            <div class="plan-name-row">
                                <span class="plan-name">${p.desc}</span>
                                ${posTag}
                            </div>
                        </div>
                        <div class="plan-amount ${amtClass}">${sign}${fmtMoney(p.amount)}</div>
                        <div class="plan-check" onclick="toggleCheck(${p.id})">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <div class="btn-delete-plan" onclick="deletePlan(${p.id})">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </div>
                    </div>
                `;
            });

            document.getElementById('lblReal').textContent = fmtMoney(saldoReal);
            document.getElementById('lblTarget').textContent = fmtMoney(state.target);
            document.getElementById('lblProj').textContent = fmtMoney(projFinal);

            let pct = state.target > 0 ? Math.round((saldoReal / state.target) * 100) : 0;
            if(pct < 0) pct = 0;
            if(pct > 100) pct = 100;

            document.getElementById('lblPercent').textContent = pct + '%';
            document.getElementById('barFill').style.width = pct + '%';

            localStorage.setItem('myPlansState', JSON.stringify(state));
        }

        function toggleCheck(id) {
            const plan = state.plans.find(p => p.id === id);
            if (plan) {
                plan.completed = !plan.completed;
                render();
            }
        }

        function deletePlan(id) {
            state.plans = state.plans.filter(p => p.id !== id);
            render();
        }

        // Modales
        function openEditModal(mode) {
            editMode = mode;
            const title = mode === 'base' ? 'Ajustar Saldo Real' : 'Editar Meta Global';
            const currentVal = mode === 'base' ? state.baseBalance : state.target;
            
            document.getElementById('editModalTitle').textContent = title;
            document.getElementById('editAmountInput').value = currentVal;
            document.getElementById('editModalOverlay').classList.add('active');
            
            setTimeout(() => document.getElementById('editAmountInput').focus(), 100);
        }

        function saveEditAmount() {
            const inputVal = parseFloat(document.getElementById('editAmountInput').value);
            if (!isNaN(inputVal)) {
                if (editMode === 'base') state.baseBalance = inputVal;
                if (editMode === 'target') state.target = inputVal;
                render();
            }
            closeModals();
        }

        function openPlanModal() {
            document.getElementById('planModalOverlay').classList.add('active');
            document.getElementById('mDate').valueAsDate = new Date();
        }

        function closeModals() {
            document.getElementById('planModalOverlay').classList.remove('active');
            document.getElementById('editModalOverlay').classList.remove('active');
            
            document.getElementById('mDesc').value = '';
            document.getElementById('mAmt').value = '';
            document.getElementById('mPos').checked = false;
        }

        function setModalType(type) {
            modalType = type;
            document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.m-tab[data-val="${type}"]`).classList.add('active');
        }

        function setModalIcon(icon) {
            modalIcon = icon;
            document.querySelectorAll('.i-opt').forEach(i => i.classList.remove('active'));
            document.querySelector(`.i-opt[data-icon="${icon}"]`).classList.add('active');
        }

        function savePlan() {
            const desc = document.getElementById('mDesc').value.trim();
            const amt = parseFloat(document.getElementById('mAmt').value);
            const date = document.getElementById('mDate').value;
            const pos = document.getElementById('mPos').checked;

            if (!desc || isNaN(amt) || !date) {
                alert("Completa descripción, monto y fecha.");
                return;
            }

            state.plans.push({
                id: Date.now(),
                type: modalType,
                icon: modalIcon,
                desc: desc,
                amount: amt,
                date: date,
                possible: pos,
                completed: false
            });

            closeModals();
            render();
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateIcons();
            render();
        });
    </script>
